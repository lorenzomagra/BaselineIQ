<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140">
  <!-- BaselineIQ — horizontal lockup for site header -->
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8590c"/>
      <stop offset="1" stop-color="#ff8a4c"/>
    </linearGradient>
    <clipPath id="ballClip2">
      <circle cx="70" cy="70" r="60"/>
    </clipPath>
  </defs>

  <!-- icon, scaled down and re-centered -->
  <g>
    <circle cx="70" cy="70" r="60" fill="#0b1220"/>
    <g clip-path="url(#ballClip2)" fill="none" stroke="#e8590c" stroke-width="3.5" stroke-linecap="round">
      <path d="M10 70H130"/>
      <path d="M70 10V130"/>
      <path d="M22 21C39 39 39 101 22 119"/>
      <path d="M118 21C101 39 101 101 118 119"/>
    </g>
    <g clip-path="url(#ballClip2)">
      <rect x="10" y="61" width="120" height="18" fill="#3f7ac0" opacity="0.22"/>
      <path d="M10 61H130" stroke="#8fbeef" stroke-width="1.6" opacity="0.85"/>
      <path d="M10 79H130" stroke="#8fbeef" stroke-width="1.6" opacity="0.85"/>
    </g>
    <circle cx="70" cy="70" r="60" fill="none" stroke="#1c2a42" stroke-width="1.6"/>
    <rect x="102" y="90" width="10" height="24" rx="2" fill="url(#barGrad)"/>
    <rect x="115" y="79" width="10" height="35" rx="2" fill="url(#barGrad)"/>
    <rect x="128" y="66" width="10" height="48" rx="2" fill="#0b1220" stroke="#e8590c" stroke-width="1.6"/>
  </g>

  <!-- wordmark -->
  <text x="168" y="86" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="52" fill="#0b1220">Baseline<tspan fill="#e8590c">IQ</tspan></text>
  <text x="170" y="110" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="15" letter-spacing="2.5" fill="#3f7ac0">BASKETBALL PERFORMANCE ANALYTICS</text>
</svg>
