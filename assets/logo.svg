<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- BaselineIQ — icon mark: basketball seams (concept 1) + data-scan band (concept 5) + ascending bar accent (concept 1) -->
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8590c"/>
      <stop offset="1" stop-color="#ff8a4c"/>
    </linearGradient>
    <clipPath id="ballClip">
      <circle cx="100" cy="100" r="86"/>
    </clipPath>
  </defs>

  <!-- base -->
  <circle cx="100" cy="100" r="86" fill="#0b1220"/>

  <!-- basketball seams -->
  <g clip-path="url(#ballClip)" fill="none" stroke="#e8590c" stroke-width="5" stroke-linecap="round">
    <path d="M14 100H186"/>
    <path d="M100 14V186"/>
    <path d="M32 30C56 56 56 144 32 170"/>
    <path d="M168 30C144 56 144 144 168 170"/>
  </g>

  <!-- data-scan band across the ball's equator (concept 5, simplified for small-size legibility) -->
  <g clip-path="url(#ballClip)">
    <rect x="14" y="88" width="172" height="24" fill="#3f7ac0" opacity="0.22"/>
    <path d="M14 88H186" stroke="#8fbeef" stroke-width="2.2" opacity="0.85"/>
    <path d="M14 112H186" stroke="#8fbeef" stroke-width="2.2" opacity="0.85"/>
  </g>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#1c2a42" stroke-width="2"/>

  <!-- ascending bar-chart accent, breaking the edge bottom-right (concept 1) -->
  <rect x="146" y="128" width="14" height="34" rx="2" fill="url(#barGrad)"/>
  <rect x="164" y="112" width="14" height="50" rx="2" fill="url(#barGrad)"/>
  <rect x="182" y="94" width="14" height="68" rx="2" fill="#0b1220" stroke="#e8590c" stroke-width="2"/>
</svg>
